name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '17 4 * * 1'

jobs:
  analyze:
    name: Analyze (C/C++)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf \
          libaspell-dev libbrotli-dev libfl-dev libfontconfig-dev \
          libfreetype-dev libglib2.0-dev libkrb5-dev libldap-dev \
          libpcre3-dev libsodium-dev libssl-dev libxml2-dev \
          libx11-dev libxext-dev libxft-dev libxpm-dev libzstd-dev \
          pkg-config python3 unicode-cldr-core zlib1g-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        build-mode: manual

    - name: Build
      run: |
        autoconf
        ./configure
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"
